<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Visualizador - Hash Linear</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; display: flex; gap: 20px; }
        .sidebar { flex: 1; background: #2d2d2d; padding: 20px; border-radius: 8px; }
        .main-content { flex: 3; background: #2d2d2d; padding: 20px; border-radius: 8px; overflow-x: auto; }
        
        h2, h3 { color: #4db8ff; border-bottom: 1px solid #444; padding-bottom: 10px; margin-top: 0;}
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; }
        input { width: 100%; padding: 8px; box-sizing: border-box; background: #1e1e1e; border: 1px solid #555; color: #fff; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #007acc; border: none; color: white; cursor: pointer; border-radius: 4px; font-weight: bold; margin-bottom: 10px; }
        button:hover { background: #005999; }
        
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.85em; background: #1e1e1e; padding: 15px; border-radius: 4px; }
        .metric-item span { color: #4db8ff; font-weight: bold; }

        .hash-table { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .bucket-row { display: flex; align-items: flex-start; gap: 10px; }
        .bucket-label { width: 60px; font-family: monospace; font-size: 1.1em; color: #888; padding-top: 10px; }
        
        .page { background: #3c3c3c; border: 2px solid #555; border-radius: 6px; padding: 10px; min-width: 120px; min-height: 40px; display: flex; flex-wrap: wrap; gap: 5px; align-content: flex-start; }
        .page.overflow { border-color: #d19a66; border-style: dashed; }
        .pointer-active { border-color: #98c379; box-shadow: 0 0 8px #98c379; }
        
        .record { background: #007acc; padding: 4px 8px; border-radius: 4px; font-size: 0.9em; }
        .arrow { color: #888; padding-top: 10px; font-weight: bold; }
        
        .log-area { margin-top: 20px; background: #1e1e1e; padding: 15px; border-radius: 4px; font-family: monospace; font-size: 0.9em; height: 100px; overflow-y: auto; color: #a5d6ff; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h2>Controles</h2>
        
        <div class="form-group">
            <label>Capacidade da Página (P)</label>
            <input type="number" id="capacity" value="3">
        </div>
        <div class="form-group">
            <label>Fator de Carga Máx (α max)</label>
            <input type="number" step="0.05" id="alpha" value="0.75">
        </div>
        <button onclick="initHash()">Inicializar Tabela</button>

        <hr style="border-color:#444; margin: 20px 0;">

        <div class="form-group">
            <label>Inserir Chave</label>
            <input type="number" id="insertKey" placeholder="Ex: 42">
        </div>
        <button onclick="insertRecord()">Inserir</button>

        <div class="form-group">
            <label>Buscar Chave</label>
            <input type="number" id="lookupKey" placeholder="Ex: 42">
        </div>
        <button onclick="lookupRecord()" style="background:#28a745;">Buscar</button>

        <h3>Métricas Atuais</h3>
        <div class="metrics-grid" id="metricsPanel">
            </div>
    </div>

    <div class="main-content">
        <h2>Visualização da Estrutura</h2>
        <div class="hash-table" id="hashTableContainer">
            <p style="color:#888;">Inicialize a tabela para começar.</p>
        </div>
        
        <div class="log-area" id="logArea">
            > Sistema pronto.
        </div>
    </div>
</div>

<script>
    let currentLevel = 0;
    let currentPointer = 0;

    function logMessage(msg) {
        const log = document.getElementById('logArea');
        log.innerHTML = `> ${msg}<br>` + log.innerHTML;
    }

    async function initHash() {
        const p = document.getElementById('capacity').value;
        const alpha = document.getElementById('alpha').value;
        
        const res = await fetch('/api/init', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ page_capacity: p, max_load_factor: alpha })
        });
        const data = await res.json();
        updateUI(data);
        logMessage(`Tabela inicializada com P=${p} e α=${alpha}`);
    }

    async function insertRecord() {
        const key = document.getElementById('insertKey').value;
        if(!key) return;

        const res = await fetch('/api/insert', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key: key })
        });
        const data = await res.json();
        updateUI(data.state);
        
        let msg = `Inserida chave ${key} (Endereço: ${data.operation.address}). Acessos: ${data.operation.accesses}.`;
        if (data.operation.splits && data.operation.splits.length > 0) {
            msg += ` <span style="color:#e5c07b;">[Split no bucket ${data.operation.splits.join(', ')}]</span>`;
        }
        logMessage(msg);
        document.getElementById('insertKey').value = '';
    }

    async function lookupRecord() {
        const key = document.getElementById('lookupKey').value;
        if(!key) return;

        const res = await fetch('/api/lookup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key: key })
        });
        const data = await res.json();
        updateUI(data.state);
        
        const status = data.operation.found ? "<span style='color:#98c379'>Encontrada</span>" : "<span style='color:#e06c75'>Não encontrada</span>";
        logMessage(`Busca por ${key}: ${status} (Endereço: ${data.operation.address}). Acessos: ${data.operation.accesses}.`);
    }

    function updateUI(state) {
        const m = state.metrics;
        currentLevel = m.level;
        currentPointer = m.pointer;

        document.getElementById('metricsPanel').innerHTML = `
            <div class="metric-item">Nível (Level): <span>${m.level}</span></div>
            <div class="metric-item">Ponteiro (p): <span>${m.pointer}</span></div>
            <div class="metric-item">Registros: <span>${m.total_records}</span></div>
            <div class="metric-item">Fator de Carga: <span>${m.load_factor.toFixed(3)}</span></div>
            <div class="metric-item">Acessos Disco: <span>${m.total_disk_accesses}</span></div>
            <div class="metric-item">Uso Espaço: <span>${m.space_utilization.toFixed(3)}</span></div>
            <div class="metric-item">Páginas: <span>${m.primary_pages}</span></div>
            <div class="metric-item">Págs Overflow: <span>${m.overflow_pages}</span></div>
        `;

        const container = document.getElementById('hashTableContainer');
        container.innerHTML = '';

        state.pages.forEach((pageData, index) => {
            const row = document.createElement('div');
            row.className = 'bucket-row';
            
            const addressBits = currentLevel + (index >= currentPointer ? 0 : 1);
            let binAddr = index.toString(2).padStart(addressBits === 0 ? 1 : addressBits, '0');
            
            const label = document.createElement('div');
            label.className = 'bucket-label';
            label.innerText = `[${index}] ${binAddr}`;
            row.appendChild(label);

            const primaryPage = document.createElement('div');
            primaryPage.className = `page ${index === currentPointer ? 'pointer-active' : ''}`;
            
            pageData.records.forEach(rec => {
                const span = document.createElement('span');
                span.className = 'record';
                span.innerText = rec;
                primaryPage.appendChild(span);
            });
            row.appendChild(primaryPage);

            pageData.overflow_chain.forEach(ov => {
                const arrow = document.createElement('div');
                arrow.className = 'arrow';
                arrow.innerText = '→';
                row.appendChild(arrow);

                const ovPage = document.createElement('div');
                ovPage.className = 'page overflow';
                ov.records.forEach(rec => {
                    const span = document.createElement('span');
                    span.className = 'record';
                    span.innerText = rec;
                    ovPage.appendChild(span);
                });
                row.appendChild(ovPage);
            });

            container.appendChild(row);
        });
    }

    window.onload = initHash;
</script>
</body>
</html>
